            .card {
                position: relative;
                width: 1200px;
                height: 600px;
                background: linear-gradient(-45deg, black 0%, darkblue 100%);
                border-radius: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
            }

            .card__img {
                width: 250px;
                fill: #333;
                transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
            }

            .card:hover {
                transform: rotate(-5deg) scale(1.1);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }

            .card__content {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(-45deg);
                width: 100%;
                height: 1000%;
                padding: 20px;
                box-sizing: border-box;
                background-color: #fff;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                opacity: 0;
                transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
            }

            .card:hover .card__content {
                transform: translate(-50%, -50%) rotate(0deg);
                opacity: 1;
            }

            .card__title {
                margin: 0;
                font-size: 24px;
                color: #333;
                font-weight: 700;
            }

            .card__description {
                margin: 10px 0 0;
                text-align: center;
                font-size: 14px;
                color: black;
                line-height: 1.4;
            }

            .card:hover svg {
                scale: 0;
                transform: rotate(-45deg);
            }
