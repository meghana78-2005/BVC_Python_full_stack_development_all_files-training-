<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: aqua;
            color: black;
            font-family: 'Times New Roman', Times, serif;
        }

        #main {
            height: 10vh;
            margin: 20px;
            background: blue;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            padding: 10px;
            ;
        }

        input {
            padding: 10px;
            color: darkblue;
            background-color: thistle;
        }

        button {
            padding: 10px;
            background: lightpink;
        }
        .card{
            background: lightgray;
            color:black;
            width:300px;

            padding: 20px;
            justify-content: center;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>

    <div id="main">
        <form id="maincontainer">
            <input type="number" id="userIdInput" value="1" min="1" max="10"/>

            <button onclick="handleClick(event)">Search</button>
        </form>
    </div>
    <div id="output"></div>

    <script>
        const fetchData = async (userIdInput) => {
            const output = document.getElementById("output");
            const data = await fetch(`https://jsonplaceholder.typicode.com/users/${userIdInput}`);
            const response = await data.json();
            console.log(response);
            output.innerHTML = `
            <div class = "card">
                Name:${response.name},
                Username:${response.username},
                Email:${response.email}
            </div>`
        }

        const handleClick = (e)=>{
            e.preventDefault();
            const userIdInput = document.getElementById("userIdInput").value;
            fetchData(userIdInput);
        }   




    </script>
</body>

</html>
