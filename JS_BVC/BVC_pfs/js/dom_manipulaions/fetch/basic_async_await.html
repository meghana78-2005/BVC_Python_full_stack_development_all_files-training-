<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: darkcyan;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #outer{
            width: 400px;
            height: 400px;
            background-color: rgb(19, 31, 120);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #inner{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            background-color:lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    
    <div id="outer"></div>
    <script>
        const fetchData = async ()=>{
            const outer = document.getElementById("outer")
            const data = await fetch("https://jsonplaceholder.typicode.com/users/4"); //4 indicates THE user id
            const response = await data.json();
            console.log(response)
            console.log(response.name)//to get name
            console.log(response.username)//to get username
            
            console.log(response.address.street)   //to get street name from address
            
            console.log(response.address.geo.lat)  //to get lat from geo in address

            const inner = document.createElement("div");
            inner.setAttribute("id","inner");
            inner.innerHTML = `
            <p>Name : ${response.username}</p>
            <p>Street : ${response.address.street}</p>
            <p>Latitude : ${response.address.geo.lat}</p>`;

            outer.appendChild(inner);
        }
        fetchData();
    </script>
</body>
</html>
