<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Background Fixed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: antiquewhite;
        }

        .bg-fixed {
            background-image: url("./scroll_down/containimg2.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: white;
            font-size: 4rem;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        .spacer {
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="bg-fixed">
        <h1>This bg is fixed</h1>
    </div>

    <div class="spacer"></div>

</body>
</html>
