<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Stack Cards</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }

        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Note: this design contains two hover states 1. card hover this just shift card above 2.card hover to see full card. OK! */

        /* Wallet Wrapper */
        .wallet {
            position: relative;
            width: 280px;
            height: 230px;
            cursor: pointer;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transition: transform 0.4s ease;
        }

        .wallet::after {
            content: "Hover to explore";
            position: absolute;
            bottom: -30px;
            font-style: italic;
            color: #0066cc;
            font-size: 14px;
            font-weight: 600;
            text-decoration: underline;
        }

        /* entry animation for card as page loads */
        @keyframes slideIntoPocket {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* this is wallet back */
        .wallet-back {
            position: absolute;
            bottom: 0;
            width: 280px;
            height: 200px;
            background: #1e341e;
            border-radius: 22px 22px 60px 60px;
            z-index: 5;
            box-shadow:
                inset 0 25px 35px rgba(0, 0, 0, 0.4),
                inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* Cards things */
        .card {
            position: absolute;
            width: 260px;
            height: 140px;
            left: 10px;
            border-radius: 16px;
            padding: 18px;
            color: white;
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                0 -4px 15px rgba(0, 0, 0, 0.1);
            transition:
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                z-index 0s;
            animation: slideIntoPocket 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        .card-inner {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chip {
            width: 32px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .label {
            font-size: 8px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }

        .value {
            font-size: 10px;
            font-weight: 500;
        }

        .card-number-wrapper {
            text-align: right;
        }

        .hidden-stars {
            font-size: 16px;
            letter-spacing: 2px;
        }

        .card-number {
            display: none;
            font-size: 14px;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* card variants */
        .python {
            background: #3776ab;
            bottom: 120px;
            z-index: 10;
            animation-delay: 0.1s;
        }

        .html {
            background: #E34C26;
            bottom: 90px;
            z-index: 20;
            animation-delay: 0.2s;
        }

        .css {
            background: #563D7C;
            bottom: 60px;
            z-index: 30;
            animation-delay: 0.3s;
        }

        .js {
            background: #F7DF1E;
            color: #323330;
            bottom: 30px;
            z-index: 40;
            animation-delay: 0.4s;
        }

        .js .chip {
            background: rgba(0, 0, 0, 0.05);
        }

        .js .label {
            color: #666;
        }

        /* Pocket */
        .pocket {
            position: absolute;
            bottom: 0;
            width: 280px;
            height: 160px;
            z-index: 40;
            filter: drop-shadow(0 15px 25px rgba(20, 40, 20, 0.4));
        }

        .pocket-content {
            position: absolute;
            top: 45px;
            width: 100%;
            text-align: center;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .balance-stars {
            color: #839e7b;
            font-size: 24px;
            letter-spacing: 4px;
            transition: 0.3s;
        }

        .balance-real {
            color: #a7c59e;
            font-size: 22px;
            font-weight: 600;
            opacity: 0;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, 10px);
            transition: 0.3s;
        }

        /* eye Logic */
        .eye-icon-wrapper {
            margin-top: 8px;
            height: 20px;
            width: 20px;
            position: relative;
            opacity: 0.3;
            transition: 0.3s;
        }

        .eye-icon {
            position: absolute;
            top: 0;
            left: 0;
            stroke: #3be60b;
            transition: 0.3s;
        }

        /* hovers works here */
        .wallet:hover {
            transform: translateY(-5px);
        }

        .wallet:hover .eye-icon-wrapper {
            opacity: 1;
        }

        /* hover effects on cards */
        .wallet:hover .python {
            transform: translateY(-105px) rotate(-3deg);
        }

        .wallet:hover .html {
            transform: translateY(-75px) rotate(2deg);
        }

        .wallet:hover .css {
            transform: translateY(-45px) rotate(-2deg);
        }

        .wallet:hover .js {
            transform: translateY(-10px) rotate(1deg);
        }

        /* indi card hover */
        .card:hover {
            z-index: 100 !important;
            transition-delay: 0s !important;
        }

        .wallet:hover .python:hover {
            transform: translateY(-85px) scale(1.05) rotate(0);
        }

        .wallet:hover .html:hover {
            transform: translateY(-70px) scale(1.05) rotate(0);
        }

        .wallet:hover .css:hover {
            transform: translateY(-60px) scale(1.05) rotate(0);
        }

        .wallet:hover .js:hover {
            transform: translateY(-50px) scale(1.05) rotate(0);
        }

        .card:hover .hidden-stars {
            display: none;
        }

        .card:hover .card-number {
            display: block;
        }

        .wallet:hover .balance-stars {
            opacity: 0;
        }

        .wallet:hover .balance-real {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .wallet:hover .eye-slash {
            opacity: 0;
            transform: scale(0.5);
        }

        .wallet:hover .eye-open {
            opacity: 1;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="wallet">
            <div class="wallet-back"></div>

            <div class="card python">
                <div class="card-inner">
                    <div class="card-top">
                        <span>Python</span>
                        <div class="chip"></div>
                    </div>
                    <div class="card-bottom">
                        <div class="card-info">
                            <span class="label">Version</span><span class="value">3.11</span>
                        </div>
                        <div class="card-number-wrapper">
                            <span class="hidden-stars">**** 1991</span>
                            <span class="card-number">Created 1991</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card html">
                <div class="card-inner">
                    <div class="card-top">
                        <span>HTML</span>
                        <div class="chip"></div>
                    </div>
                    <div class="card-bottom">
                        <div class="card-info">
                            <span class="label">Version</span><span class="value">5.0</span>
                        </div>
                        <div class="card-number-wrapper">
                            <span class="hidden-stars">**** 2014</span>
                            <span class="card-number">Released 2014</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card css">
                <div class="card-inner">
                    <div class="card-top">
                        <span>CSS</span>
                        <div class="chip"></div>
                    </div>
                    <div class="card-bottom">
                        <div class="card-info">
                            <span class="label">Version</span><span class="value">3.0</span>
                        </div>
                        <div class="card-number-wrapper">
                            <span class="hidden-stars">**** 1996</span>
                            <span class="card-number">Created 1996</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card js">
                <div class="card-inner">
                    <div class="card-top">
                        <span>JavaScript</span>
                        <div class="chip"></div>
                    </div>
                    <div class="card-bottom">
                        <div class="card-info">
                            <span class="label">Version</span><span class="value">ES12</span>
                        </div>
                        <div class="card-number-wrapper">
                            <span class="hidden-stars">**** 1995</span>
                            <span class="card-number">Created 1995</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pocket">
                <svg class="pocket-svg" viewBox="0 0 280 160" fill="none">
                    <path
                        d="M 0 20 C 0 10, 5 10, 10 10 C 20 10, 25 25, 40 25 L 240 25 C 255 25, 260 10, 270 10 C 275 10, 280 10, 280 20 L 280 120 C 280 155, 260 160, 240 160 L 40 160 C 20 160, 0 155, 0 120 Z"
                        fill="#1e341e"></path>
                    <path
                        d="M 8 22 C 8 16, 12 16, 15 16 C 23 16, 27 29, 40 29 L 240 29 C 253 29, 257 16, 265 16 C 268 16, 272 16, 272 22 L 272 120 C 272 150, 255 152, 240 152 L 40 152 C 25 152, 8 152, 8 120 Z"
                        stroke="#3d5635" stroke-width="1.5" stroke-dasharray="6 4"></path>
                </svg>
                <div class="pocket-content">
                    <div style="position: relative; height: 24px; width: 100%;">
                        <div class="balance-stars">******</div>
                        <div class="balance-real">Technical skills</div>
                    </div>
                    <div style="color: #698263; font-size: 12px; font-weight: 500;">
                        cards
                    </div>
                    <div class="eye-icon-wrapper">
                        <svg class="eye-icon eye-slash" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <line x1="3" y1="3" x2="21" y2="21"></line>
                        </svg>
                        <svg class="eye-icon eye-open" style="opacity: 0;" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
