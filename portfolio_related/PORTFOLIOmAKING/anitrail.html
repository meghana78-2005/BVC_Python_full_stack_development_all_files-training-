<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        flex-container {
            display: flex;
            flex: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .flex-item {
            width: 150px;
            height: 150px;
            background-color: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 15px rgb(11, 0, 0);
            transition: background-color 2s;
        }

        .image{
            margin:40px;
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            height: 400px;
            weight: 500px;
        }
        .flex-item:hover {
            background-color: #0b0b0b;
        }

        .slideDown {
            animation: slideDown 1s ease-out;
        }
        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>

</head>
